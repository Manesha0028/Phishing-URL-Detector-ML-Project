<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🛡️ PhishShield - Advanced Phishing Detection System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: #fff;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated Background */
        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .bg-animation::before {
            content: '';
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(102,126,234,0.1) 0%, rgba(118,75,162,0.1) 100%);
            animation: rotate 20s linear infinite;
        }

        @keyframes rotate {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Header */
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo-text h1 {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #a8c0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text p {
            font-size: 14px;
            opacity: 0.8;
        }

        .status-card {
            background: rgba(0,0,0,0.3);
            padding: 12px 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .status-indicator {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            animation: blink 1.5s infinite;
        }

        .status-indicator.online {
            background: #48bb78;
            box-shadow: 0 0 10px #48bb78;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-icon {
            font-size: 30px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 12px;
            opacity: 0.8;
        }

        /* Main Grid */
        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        /* Panels */
        .panel {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            padding: 25px;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s;
        }

        .panel:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .panel-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(255,255,255,0.2);
        }

        .panel-header i {
            font-size: 24px;
            color: #667eea;
        }

        .panel-header h2 {
            font-size: 20px;
            font-weight: 600;
        }

        /* URL Input */
        .url-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            flex-wrap: wrap;
        }

        .url-input-wrapper {
            flex: 1;
            position: relative;
        }

        .url-input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
        }

        .url-input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 15px;
            background: rgba(255,255,255,0.95);
            font-size: 14px;
            transition: all 0.3s;
        }

        .url-input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102,126,234,0.3);
        }

        /* Buttons */
        .btn {
            padding: 15px 25px;
            border: none;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
        }

        .btn-danger {
            background: linear-gradient(135deg, #f56565, #e53e3e);
            color: white;
        }

        .btn-warning {
            background: linear-gradient(135deg, #ed8936, #dd6b20);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Test Buttons Grid */
        .test-buttons-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            margin-bottom: 25px;
        }

        .test-btn {
            padding: 10px 15px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
        }

        .test-btn:hover {
            background: rgba(255,255,255,0.2);
            transform: translateY(-2px);
        }

        /* Result Area */
        .result-area {
            min-height: 500px;
        }

        .result-card {
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .result-header {
            text-align: center;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .result-header.legitimate {
            background: linear-gradient(135deg, rgba(72,187,120,0.2), rgba(56,161,105,0.2));
            border: 2px solid #48bb78;
        }

        .result-header.phishing {
            background: linear-gradient(135deg, rgba(245,101,101,0.2), rgba(229,62,62,0.2));
            border: 2px solid #f56565;
        }

        .result-icon {
            font-size: 60px;
            margin-bottom: 15px;
        }

        .result-label {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        .result-confidence {
            font-size: 18px;
            opacity: 0.9;
        }

        .confidence-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 15px;
        }

        .confidence-fill {
            height: 100%;
            border-radius: 10px;
            transition: width 1s ease;
        }

        .confidence-fill.high {
            background: linear-gradient(90deg, #48bb78, #38a169);
        }

        .confidence-fill.medium {
            background: linear-gradient(90deg, #ed8936, #dd6b20);
        }

        .confidence-fill.low {
            background: linear-gradient(90deg, #f56565, #e53e3e);
        }

        /* Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .metric-card {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
        }

        .metric-label {
            font-size: 11px;
            opacity: 0.7;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .metric-value {
            font-size: 14px;
            font-weight: 600;
            word-break: break-word;
        }

        /* Warnings */
        .warning-box {
            background: rgba(237,137,54,0.2);
            border-left: 4px solid #ed8936;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .suspicious-reasons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }

        .reason-tag {
            background: rgba(245,101,101,0.3);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
        }

        /* Loading */
        .loading-container {
            text-align: center;
            padding: 60px 20px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Features Section */
        .features-section {
            margin-top: 20px;
        }

        .features-toggle {
            background: rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 10px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .features-toggle:hover {
            background: rgba(255,255,255,0.2);
        }

        .features-table {
            margin-top: 15px;
            max-height: 400px;
            overflow-y: auto;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px;
        }

        .feature-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            padding: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 12px;
        }

        .feature-name {
            font-weight: 600;
            color: #a8c0ff;
        }

        /* Responsive */
        @media (max-width: 968px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
            
            .stats-bar {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 568px) {
            .stats-bar {
                grid-template-columns: 1fr;
            }
            
            .metrics-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="header-content">
                <div class="logo-area">
                    <div class="logo-icon">
                        <i class="fas fa-shield-haltered"></i>
                    </div>
                    <div class="logo-text">
                        <h1>PhishShield</h1>
                        <p>Advanced Phishing Detection System</p>
                    </div>
                </div>
                <div class="status-card">
                    <div class="status-indicator online" id="statusIndicator"></div>
                    <span id="apiStatusText">Checking API...</span>
                </div>
            </div>
        </div>

        <!-- Stats Bar -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                <div class="stat-value" id="totalTests">0</div>
                <div class="stat-label">Total Tests</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-check-circle"></i></div>
                <div class="stat-value" id="legitCount">0</div>
                <div class="stat-label">Legitimate</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-exclamation-triangle"></i></div>
                <div class="stat-value" id="phishCount">0</div>
                <div class="stat-label">Phishing</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon"><i class="fas fa-robot"></i></div>
                <div class="stat-value" id="activeModelName">Random Forest</div>
                <div class="stat-label">Active ML Model</div>
            </div>
        </div>

        <div class="main-grid">
            <!-- Left Panel - Input -->
            <div class="panel">
                <div class="panel-header">
                    <i class="fas fa-search"></i>
                    <h2>URL Analysis</h2>
                </div>
                
                <div style="margin-bottom: 15px;">
                    <label style="font-size: 13px; opacity: 0.8; display: block; margin-bottom: 8px;"><i class="fas fa-brain"></i> Select Model</label>
                    <div style="display: flex; gap: 10px;">
                        <button id="btnRF" class="btn btn-primary" style="flex:1;" onclick="selectModel('random_forest')">
                            <i class="fas fa-tree"></i> Random Forest
                        </button>
                        <button id="btnLR" class="btn" style="flex:1; background: rgba(255,255,255,0.15); color: white;" onclick="selectModel('logistic_regression')">
                            <i class="fas fa-chart-line"></i> Logistic Regression
                        </button>
                    </div>
                </div>

                <div class="url-input-group">
                    <div class="url-input-wrapper">
                        <i class="fas fa-link"></i>
                        <input type="text" id="customUrl" class="url-input" placeholder="Enter URL to analyze...">
                    </div>
                    <button class="btn btn-primary" onclick="testCustomUrl()">
                        <i class="fas fa-chart-simple"></i> Analyze
                    </button>
                </div>
                
                <div class="panel-header">
                    <i class="fas fa-bolt"></i>
                    <h2>Quick Test URLs</h2>
                </div>
                <div class="test-buttons-grid">
                    <button class="test-btn" onclick="testUrl('https://google.com')">
                        <i class="fab fa-google"></i> Google
                    </button>
                    <button class="test-btn" onclick="testUrl('https://github.com')">
                        <i class="fab fa-github"></i> GitHub
                    </button>
                    <button class="test-btn" onclick="testUrl('https://stackoverflow.com')">
                        <i class="fab fa-stack-overflow"></i> Stack Overflow
                    </button>
                    <button class="test-btn" onclick="testUrl('https://wikipedia.org')">
                        <i class="fab fa-wikipedia-w"></i> Wikipedia
                    </button>
                    <button class="test-btn" onclick="testUrl('https://microsoft.com')">
                        <i class="fab fa-microsoft"></i> Microsoft
                    </button>
                </div>
                
                <div class="panel-header">
                    <i class="fas fa-bug"></i>
                    <h2>Suspicious Patterns Test</h2>
                </div>
                <div class="test-buttons-grid">
                    <button class="test-btn" onclick="testUrl('http://login-secure-verify.xyz')">
                        <i class="fas fa-skull"></i> Suspicious Domain
                    </button>
                    <button class="test-btn" onclick="testUrl('http://paypal-verify.ga/login')">
                        <i class="fab fa-paypal"></i> Fake PayPal
                    </button>
                    <button class="test-btn" onclick="testUrl('http://banking-secure.tk')">
                        <i class="fas fa-university"></i> Fake Banking
                    </button>
                    <button class="test-btn" onclick="testUrl('http://apple-id-verify.cf')">
                        <i class="fab fa-apple"></i> Fake Apple
                    </button>
                    <button class="test-btn" onclick="testUrl('http://amazon-prime-update.ml')">
                        <i class="fab fa-amazon"></i> Fake Amazon
                    </button>
                </div>
            </div>

            <!-- Right Panel - Results -->
            <div class="panel">
                <div class="panel-header">
                    <i class="fas fa-chart-pie"></i>
                    <h2>Analysis Results</h2>
                </div>
                <div id="resultArea" class="result-area">
                    <div class="loading-container">
                        <div class="spinner"></div>
                        <p>Ready to analyze URLs</p>
                        <p style="font-size: 12px; opacity: 0.7; margin-top: 10px;">Enter a URL above or click a test button</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = "http://127.0.0.1:5000";
        let stats = { total: 0, legit: 0, phish: 0 };
        let selectedModel = 'random_forest';

        function selectModel(key) {
            selectedModel = key;
            const labels = { random_forest: 'Random Forest', logistic_regression: 'Logistic Regression' };
            document.getElementById('activeModelName').textContent = labels[key];
            document.getElementById('btnRF').style.background = key === 'random_forest' ? 'linear-gradient(135deg, #667eea, #764ba2)' : 'rgba(255,255,255,0.15)';
            document.getElementById('btnLR').style.background = key === 'logistic_regression' ? 'linear-gradient(135deg, #667eea, #764ba2)' : 'rgba(255,255,255,0.15)';
        }

        function updateStats(label) {
            stats.total++;
            if (label === 'Legitimate') {
                stats.legit++;
            } else {
                stats.phish++;
            }
            document.getElementById('totalTests').textContent = stats.total;
            document.getElementById('legitCount').textContent = stats.legit;
            document.getElementById('phishCount').textContent = stats.phish;
        }

        async function checkApiStatus() {
            try {
                const response = await fetch(`${API_BASE}/`);
                if (response.ok) {
                    document.getElementById('statusIndicator').className = 'status-indicator online';
                    document.getElementById('apiStatusText').textContent = 'API Online - Connected';
                } else {
                    throw new Error('API error');
                }
            } catch (error) {
                document.getElementById('statusIndicator').className = 'status-indicator';
                document.getElementById('statusIndicator').style.background = '#f56565';
                document.getElementById('apiStatusText').textContent = 'API Offline - Start Flask server';
            }
        }

        async function testUrl(url) {
            document.getElementById('customUrl').value = url;
            
            document.getElementById('resultArea').innerHTML = `
                <div class="loading-container">
                    <div class="spinner"></div>
                    <p>Analyzing ${url.length > 50 ? url.substring(0, 50) + '...' : url}</p>
                    <p style="font-size: 12px; opacity: 0.7;">Fetching webpage features and running ML model...</p>
                </div>
            `;

            try {
                const response = await fetch(`${API_BASE}/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url: url, model: selectedModel })
                });

                const data = await response.json();

                if (data.error) throw new Error(data.error);

                const isLegitimate = data.label === 'Legitimate';
                updateStats(data.label);
                
                const confidence = data.confidence || 0;
                let confidenceClass = 'high';
                if (confidence < 60) confidenceClass = 'low';
                else if (confidence < 80) confidenceClass = 'medium';
                
                let warningsHtml = '';
                if (data.warning) {
                    warningsHtml = `
                        <div class="warning-box">
                            <i class="fas fa-exclamation-triangle"></i> ${data.warning}
                        </div>
                    `;
                }
                
                let reasonsHtml = '';
                if (data.suspicious_reasons && data.suspicious_reasons.length > 0) {
                    reasonsHtml = `
                        <div class="suspicious-reasons">
                            ${data.suspicious_reasons.map(reason => `<span class="reason-tag"><i class="fas fa-flag"></i> ${reason}</span>`).join('')}
                        </div>
                    `;
                }
                
                let featuresHtml = '';
                if (data.used_features) {
                    featuresHtml = '<div class="features-table">';
                    for (const [key, value] of Object.entries(data.used_features).slice(0, 20)) {
                        featuresHtml += `
                            <div class="feature-row">
                                <span class="feature-name">${key}</span>
                                <span>${value}</span>
                            </div>
                        `;
                    }
                    featuresHtml += '</div>';
                }

                document.getElementById('resultArea').innerHTML = `
                    <div class="result-card">
                        <div class="result-header ${isLegitimate ? 'legitimate' : 'phishing'}">
                            <div class="result-icon">
                                ${isLegitimate ? '<i class="fas fa-shield-alt"></i>' : '<i class="fas fa-skull-crossbones"></i>'}
                            </div>
                            <div class="result-label">${data.label}</div>
                            <div class="result-confidence">${confidence.toFixed(1)}% Confidence</div>
                            <div class="confidence-bar">
                                <div class="confidence-fill ${confidenceClass}" style="width: ${confidence}%"></div>
                            </div>
                        </div>
                        
                        <div class="metrics-grid">
                            <div class="metric-card">
                                <div class="metric-label"><i class="fas fa-brain"></i> Model</div>
                                <div class="metric-value">${data.model}</div>
                            </div>
                            <div class="metric-card">
                                <div class="metric-label"><i class="fas fa-chart-simple"></i> Raw Score</div>
                                <div class="metric-value">${data.prediction} (0=Legit, 1=Phish)</div>
                            </div>
                            <div class="metric-card">
                                <div class="metric-label"><i class="fas fa-tachometer-alt"></i> Suspicious Score</div>
                                <div class="metric-value">${data.suspicious_score || 0}/10</div>
                            </div>
                            <div class="metric-card">
                                <div class="metric-label"><i class="fas fa-globe"></i> Analyzed URL</div>
                                <div class="metric-value" style="font-size: 11px;">${data.url || url}</div>
                            </div>
                        </div>
                        
                        ${warningsHtml}
                        ${reasonsHtml}
                        
                        <div class="features-section">
                            <div class="features-toggle" onclick="toggleFeatures()">
                                <i class="fas fa-chart-bar"></i> View Extracted Features (${Object.keys(data.used_features || {}).length}/45)
                            </div>
                            <div id="featuresTable" style="display: none;">
                                ${featuresHtml}
                            </div>
                        </div>
                    </div>
                `;
            } catch (error) {
                document.getElementById('resultArea').innerHTML = `
                    <div class="result-header phishing">
                        <div class="result-icon"><i class="fas fa-exclamation-triangle"></i></div>
                        <div class="result-label">Error</div>
                        <div class="result-confidence">${error.message}</div>
                    </div>
                    <div class="metric-card" style="padding: 15px; margin-top: 15px;">
                        <div class="metric-label">Troubleshooting</div>
                        <div class="metric-value" style="font-size: 12px;">
                            1. Make sure Flask server is running on port 5000<br>
                            2. Check if URL is valid (starts with http:// or https://)<br>
                            3. Verify network connection
                        </div>
                    </div>
                `;
            }
        }

        async function testCustomUrl() {
            const url = document.getElementById('customUrl').value.trim();
            if (!url) {
                alert('Please enter a URL');
                return;
            }
            
            let fullUrl = url;
            if (!url.startsWith('http://') && !url.startsWith('https://')) {
                fullUrl = 'https://' + url;
            }
            
            await testUrl(fullUrl);
        }

        function toggleFeatures() {
            const featuresTable = document.getElementById('featuresTable');
            if (featuresTable) {
                const isHidden = featuresTable.style.display === 'none';
                featuresTable.style.display = isHidden ? 'block' : 'none';
            }
        }

        checkApiStatus();
        setInterval(checkApiStatus, 30000);
    </script>
</body>
</html>
